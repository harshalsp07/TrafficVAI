# Helmet Detection Dataset Configuration
# Classes: helmet, no_helmet, rider, motorcycle
task: detect
model: yolov12s.pt  # Slightly larger model for fine-grained helmet classification
data: datasets/helmet_detection/dataset.yaml

# Training hyperparameters
epochs: 120
batch: 16
imgsz: 640
device: ''  # auto-detect
workers: 8
patience: 25
save_period: 10

# Optimizer
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8

# Augmentation - tuned for close-up crops of riders
hsv_h: 0.02
hsv_s: 0.7
hsv_v: 0.5
degrees: 10.0
translate: 0.15
scale: 0.6
shear: 2.0
perspective: 0.001
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1
copy_paste: 0.15

# Loss weights
box: 7.5
cls: 0.8
dfl: 1.5

# Classes
names:
  0: helmet
  1: no_helmet
  2: rider
  3: motorcycle
