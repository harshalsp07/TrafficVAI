# License Plate Detection Dataset Configuration
# Classes: license_plate (single class)
task: detect
model: yolov12n.pt  # Lightweight model sufficient for single-class detection
data: datasets/plate_detection/dataset.yaml

# Training hyperparameters
epochs: 80
batch: 32
imgsz: 640
device: ''  # auto-detect
workers: 8
patience: 20
save_period: 10

# Optimizer
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8

# Augmentation - higher scale variation for varied distances
hsv_h: 0.01
hsv_s: 0.5
hsv_v: 0.4
degrees: 5.0
translate: 0.15
scale: 0.8
shear: 2.0
perspective: 0.001
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.05
copy_paste: 0.2

# Loss weights
box: 7.5
cls: 0.3
dfl: 1.5

# Classes
names:
  0: license_plate
