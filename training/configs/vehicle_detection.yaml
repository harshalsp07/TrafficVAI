# Vehicle Detection Dataset Configuration
# Classes: car, truck, motorcycle, bus, auto_rickshaw, bicycle, pedestrian
task: detect
model: yolov12n.pt  # Options: yolov12n.pt, yolov12s.pt, yolov12m.pt
data: datasets/vehicle_detection/dataset.yaml

# Training hyperparameters
epochs: 100
batch: 16
imgsz: 640
device: ''  # auto-detect: '' for auto, 'cpu', '0' for GPU 0
workers: 8
patience: 20
save_period: 10

# Optimizer
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8

# Augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.15
copy_paste: 0.1

# Loss weights
box: 7.5
cls: 0.5
dfl: 1.5

# Classes
names:
  0: car
  1: truck
  2: motorcycle
  3: bus
  4: auto_rickshaw
  5: bicycle
  6: pedestrian
